name: Secret scan

on:
  pull_request:
  push:
    branches:
      - main
      - beta
      - experimental

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run masked repository secret scan
        run: |
          python scripts/secret_scan.py --history --report build/security/secret-scan.md --json-out build/security/secret-scan.json

      - name: Upload masked scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-report
          path: build/security/
          if-no-files-found: ignore
